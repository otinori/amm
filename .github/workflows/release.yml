name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.4.6) — release is created as draft'
        required: true
        default: '0.1.4.6'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install WiX 5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Restore
        run: dotnet restore Amm.sln

      - name: Test
        run: dotnet test Amm.sln -c Release

      - name: Extract version from tag
        id: ver
        shell: pwsh
        run: |
          # workflow_dispatch では inputs.version を使い、タグ push では ref_name を使う
          $raw = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ github.event.inputs.version }}"
          } else {
            "${{ github.ref_name }}".TrimStart('v')
          }
          $parts = $raw.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          "semver=$raw"                          >> $env:GITHUB_OUTPUT
          "fourpart=$($parts[0..3] -join '.')"   >> $env:GITHUB_OUTPUT

      - name: Publish binaries
        run: tools\publish.cmd ${{ steps.ver.outputs.semver }}

      - name: Build MSI
        run: >
          dotnet build src\installer\wix\Amm.Installer.wixproj
          -c Release
          -p:ProductVersion=${{ steps.ver.outputs.fourpart }}

      - name: Zip MSI
        shell: pwsh
        run: |
          $msi = "artifacts\packages\amm-setup-${{ steps.ver.outputs.fourpart }}.msi"
          $zip = "artifacts\packages\amm-setup-${{ steps.ver.outputs.fourpart }}.msi.zip"
          Compress-Archive -Path $msi -DestinationPath $zip

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v3
        with:
          name: amm v${{ steps.ver.outputs.semver }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/packages/amm-setup-${{ steps.ver.outputs.fourpart }}.msi
            artifacts/packages/amm-setup-${{ steps.ver.outputs.fourpart }}.msi.zip
            artifacts/publish/amm.exe
            artifacts/publish/amm-mcp.exe
